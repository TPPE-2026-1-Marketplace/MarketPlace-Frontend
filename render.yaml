services:
  - type: web
    name: dk-fashion-web
    runtime: static
    # SPA Vite: o Render roda o build a partir do repo e publica a pasta dist/.
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    # React Router (SPA): toda rota cai no index.html (senão /pedido, /produtos/:id
    # etc. dão 404 ao acessar direto ou recarregar).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Embutida em BUILD time pelo Vite. Aponte para a API de produção, incluindo
      # o sufixo /api. Ex.: https://dk-fashion-api-image.onrender.com/api
      - key: VITE_API_URL
        sync: false
      - key: NODE_VERSION
        value: "22"
