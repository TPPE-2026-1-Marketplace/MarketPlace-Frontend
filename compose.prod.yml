services:
  app:
    image: ${DOCKER_USERNAME}/marketplace-frontend:${TAG:-latest}
    ports:
      - "${APP_PORT:-3003}:80"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
