services:
  app:
    image: marketplace-frontend-dev
    build:
      context: .
      target: dev
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    networks:
      default:
        aliases:
          - app.internal

  selenium:
    image: selenium/standalone-chrome:latest
    shm_size: 2g
    tmpfs:
      - /tmp:size=1g,mode=1777
    depends_on:
      - app
    ports:
      - "4444:4444"
      - "7900:7900"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  node_modules:
