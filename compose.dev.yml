services:
  app:
    image: marketplace-frontend-dev
    build:
      context: .
      target: dev
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
