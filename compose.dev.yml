services:
  app:
    image: marketplace-frontend-dev
    build:
      context: .
      target: dev
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      HOME: /home/node
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm-store:/app/.pnpm-store

volumes:
  node_modules:
  pnpm-store:
