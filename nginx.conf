server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Healthcheck endpoint — sem dependência de Node.js em produção
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # SPA fallback: redireciona rotas desconhecidas para index.html
    # Necessário para React Router (client-side routing) funcionar
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets estáticos com hash no nome (gerados pelo Vite)
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
}
